<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Видеоплеер с транскриптом</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <button id="home-btn" class="home-btn hidden" title="К списку видео">← Библиотека</button>
    <h1 id="title">Библиотека</h1>
  </header>

  <section id="library" class="library">
    <form id="lib-form" class="folder-bar">
      <input id="lib-input" type="text" placeholder="Путь к папке-библиотеке…" spellcheck="false">
      <button type="submit">Сменить</button>
      <span id="lib-msg"></span>
    </form>
    <div id="lib-grid" class="lib-grid"></div>
  </section>

  <main id="player-view" class="hidden">
    <section class="player">
      <video id="video" controls preload="metadata"></video>
      <div id="summary" class="summary"></div>
    </section>

    <aside class="transcript">
      <div class="controls">
        <select id="lang-select" title="Язык транскрипта"></select>
        <button id="autoscroll-btn" class="toggle on" title="Автоскролл">⭿ Автоскролл</button>
      </div>
      <div class="search">
        <input id="search-input" type="search" placeholder="Поиск по транскрипту…">
        <span id="search-count"></span>
      </div>
      <div id="cues" class="cues"></div>
    </aside>
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
